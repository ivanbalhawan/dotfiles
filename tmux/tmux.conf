# General Settings
set -g xterm-keys on
set -g mouse on
set -g history-limit 10000
set -g default-terminal "tmux-256color"
set -g renumber-windows on


set -g set-titles on
set -g set-titles-string "#S"

unbind space


bind -n C-Tab next-window
bind -n C-BTab previous-window

bind C-n next-window
bind C-p previous-window
unbind p
unbind n
bind n next-window
bind p previous-window


bind  N swap-window -t +1 \; next-window
bind P swap-window -t -1 \; previous-window

# Set Ctrl+a as default prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind \$
bind \$ command-prompt -I "" { rename-window "%%" }
unbind \^ 
bind \^ command-prompt -I "#S" { rename-session "%%" }

bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

bind M-Up command-prompt -p "resize-pane -U by:" "resize-pane -U '%%'"
bind M-Down command-prompt -p "resize-pane -D by:" "resize-pane -D '%%'"
bind M-Left command-prompt -p "resize-pane -L by:" "resize-pane -L '%%'"
bind M-Right command-prompt -p "resize-pane -R by:" "resize-pane -R '%%'"


unbind \#
bind \# source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/tmux.conf"
unbind ,
unbind .
bind . swap-window -t +1 \; next-window
bind , swap-window -t -1 \; previous-window




set -g status-bg colour236
set -g status-fg white
set -g status-interval 2
set -g status-left-length 30
set -g status-left "#[fg=red]#S #[default]"
set -g status-right "#[fg=red]%Y-%m-%d %H:%M #[default]"

set -g pane-border-lines double
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=red

# Use zoxide/fzf in tmux without conflicts
set -g default-command "${SHELL}"


# Plugins
set -g @plugin "tmux-plugins/tmp"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "sainnhe/tmux-fzf"


run '~/.config/tmux/plugins/tpm/tpm'


# New Window/Pane Binds
unbind c
unbind h
unbind v
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
bind M-v select-layout even-vertical
bind M-h select-layout even-horizontal

# unbind C-n
# unbind C-p
bind g display-popup -d "#{pane_current_path}" -E -w 80% -h 80% lazygit
bind C-g display-popup -d "#{pane_current_path}" -E -w 80% -h 80% lazygit
# bind n display-popup -d "#{pane_current_path}" -E -w 80% -h 80%
# bind C-n display-popup -d "#{pane_current_path}" -E -w 80% -h 80%
bind t new-window -c "#{pane_current_path}"
bind C-t new-window -c "#{pane_current_path}"
unbind C-r

